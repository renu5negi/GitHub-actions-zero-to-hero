# this is workflow name
name: Hello workflow

# runs on a trigger
on:
  workflow_dispatch: 

# these are the jobs inside the workflow
jobs:

  # this is the name of the job
  greet:
     # this is the github runner, each job runs on a runner
     runs-on: ubuntu-latest
     steps:
       - name: say hello to users
         run: echo "hello dosto"

       - name: say hello to username
         run: echo "Hello $USER"

  details:
       runs-on: ubuntu-latest
       steps:
       - name: version of docker and python
         run: docker --version && python --version
