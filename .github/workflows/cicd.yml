# this is the name of the workflow that will be displayed in the actions tab
name: CICD

# manual click (deliver) workflow whenever user needs
on:
  workflow_dispatch: 

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
     - name: checkout code
       run: echo "code clone from github"

  build:
    needs: code
    runs-on: ubuntu-latest
    steps:
     - name: build docker container
       run: echo "docker container build"

  test:
    needs: code, build
     runs-on: ubuntu-latest
     steps:
     - name: test the container
       run: echo "testing the container"

  deploy:
    needs: code, build, deploy
      runs-on: ubuntu-latest
      steps:
      - name: deploy the app
        run: echo "docker compose deployed the app"
